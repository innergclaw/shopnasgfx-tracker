<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPNASGFXTRACKER2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --bg2: #111;
            --card: #161616;
            --card-hover: #1c1c1c;
            --border: #2a2a2a;
            --text: #fff;
            --muted: #888;
            --accent: #6366f1;
            --accent-hover: #5558e8;
            --green: #22c55e;
            --green-bg: rgba(34,197,94,0.1);
            --yellow: #eab308;
            --yellow-bg: rgba(234,179,8,0.1);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,0.1);
            --blue: #3b82f6;
            --blue-bg: rgba(59,130,246,0.1);
            --purple: #a855f7;
            --purple-bg: rgba(168,85,247,0.1);
            --radius: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Dashboard */
        .dashboard { display: block; }

        .topbar {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg2);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .topbar h1 span { color: var(--accent); }

        .topbar-actions { display: flex; gap: 10px; align-items: center; }

        .topbar-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-family: inherit;
        }

        .topbar-btn:hover { border-color: var(--accent); }

        .topbar-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .topbar-btn.primary:hover { background: var(--accent-hover); }

        .topbar-btn.danger {
            border-color: var(--red);
            color: var(--red);
        }

        .topbar-btn.danger:hover {
            background: var(--red-bg);
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            padding: 20px 24px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .stat-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .stat-card .value.green { color: var(--green); }
        .stat-card .value.blue { color: var(--blue); }
        .stat-card .value.purple { color: var(--purple); }
        .stat-card .value.yellow { color: var(--yellow); }

        /* Client Grid */
        .section-title {
            padding: 0 24px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            font-weight: 700;
            margin: 16px 0 12px;
        }

        .client-grid {
            display: grid;
            gap: 12px;
            padding: 0 24px 24px;
        }

        .client-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: start;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .client-card:hover { border-color: var(--accent); }

        .client-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .client-business {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .client-service {
            display: inline-block;
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--accent);
            background: var(--purple-bg);
            color: var(--purple);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .client-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 500;
        }

        .client-meta span { display: flex; align-items: center; gap: 4px; }

        .client-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .client-amount {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--green);
        }

        .stage-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
        }

        .stage-paid { background: var(--green-bg); color: var(--green); }
        .stage-received { background: var(--blue-bg); color: var(--blue); }
        .stage-design { background: var(--purple-bg); color: var(--purple); }
        .stage-review { background: var(--yellow-bg); color: var(--yellow); }
        .stage-revision { background: var(--yellow-bg); color: var(--yellow); }
        .stage-launch { background: var(--red-bg); color: var(--red); }
        .stage-completed { background: var(--green-bg); color: var(--green); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 1.3rem;
            margin-bottom: 24px;
        }

        .modal .field { margin-bottom: 16px; }

        .modal label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal input,
        .modal select,
        .modal textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
        }

        .modal select { cursor: pointer; }
        .modal textarea { resize: vertical; min-height: 60px; }

        .modal input:focus,
        .modal select:focus,
        .modal textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .modal-actions .save {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .modal-actions .save:hover { background: var(--accent-hover); }

        .modal-actions .cancel {
            background: var(--card);
            color: var(--text);
        }

        .modal-actions .cancel:hover { border-color: var(--muted); }

        .modal-actions .delete {
            background: transparent;
            color: var(--red);
            border-color: var(--red);
            flex: 0;
        }

        .modal-actions .delete:hover { background: var(--red-bg); }

        .tracker-link {
            display: inline-block;
            color: var(--blue);
            font-size: 0.82rem;
            text-decoration: none;
            font-weight: 600;
            margin-top: 8px;
        }

        .tracker-link:hover { text-decoration: underline; }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty .icon { font-size: 3rem; margin-bottom: 12px; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 200;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .toast.active { display: block; }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 600px) {
            .client-card {
                grid-template-columns: 1fr;
            }
            .client-right {
                text-align: left;
                flex-direction: row;
                align-items: center;
            }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="dashboard active" id="dashboard">
        <div class="topbar">
            <h1>SHOPNASGFXTRACKER<span>2026</span></h1>
            <div class="topbar-actions">
                <button class="topbar-btn primary" onclick="openAddModal()">+ New Project</button>
                <button class="topbar-btn" onclick="exportData()">Export</button>
            </div>
        </div>

        <div class="stats-row" id="statsRow"></div>
        <div class="section-title">All Projects</div>
        <div class="client-grid" id="clientGrid"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <h2 id="modalTitle">Edit Project</h2>
            <input type="hidden" id="editId">
            <div class="field">
                <label>Client Name</label>
                <input type="text" id="editName" placeholder="Full name">
            </div>
            <div class="field">
                <label>Business / Brand</label>
                <input type="text" id="editBusiness" placeholder="Business name">
            </div>
            <div class="field">
                <label>Service</label>
                <select id="editService">
                    <option value="Logo Design">Logo Design</option>
                    <option value="Logo + Branding">Logo + Branding</option>
                    <option value="Logo + Brand Identity">Logo + Brand Identity</option>
                    <option value="Brand Identity">Brand Identity</option>
                    <option value="Full Rebrand">Full Rebrand</option>
                    <option value="Social Media Kit">Social Media Kit</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="field">
                <label>Amount ($)</label>
                <input type="number" id="editAmount" placeholder="0.00">
            </div>
            <div class="field">
                <label>Stage</label>
                <select id="editStage">
                    <option value="Received">Received</option>
                    <option value="Design">Design</option>
                    <option value="Review">Review</option>
                    <option value="Revision">Revision</option>
                    <option value="Launch">Launch</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <div class="field">
                <label>Notes</label>
                <textarea id="editNotes" placeholder="Internal notes..."></textarea>
            </div>
            <div class="field">
                <label>Tracker Slug (for URL)</label>
                <input type="text" id="editSlug" placeholder="e.g. jamal">
            </div>
            <div class="modal-actions">
                <button class="cancel" onclick="closeModal()">Cancel</button>
                <button class="save" onclick="saveProject()">Save</button>
                <button class="delete" onclick="deleteProject()">🗑</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const STORAGE_KEY = 'shopnasgfx_projects';

        // Default projects
        const defaultProjects = [
            { id: 'p1', name: 'Jamal', business: 'Hybrid Human', service: 'Logo + Brand Identity', amount: 350, deposit: 100, stage: 'Design', notes: '$100 deposit paid, $250 remaining', slug: 'jamal', date: '2026-04-10' },
            { id: 'p2', name: 'Helena', business: 'Honey & Friends', service: 'Logo + Branding', amount: 175, deposit: 175, stage: 'Review', notes: 'Full payment received', slug: 'helena', date: '2026-04-05' },
            { id: 'p3', name: 'Vivian Royster', business: 'Miikko.Inc', service: 'Logo Design', amount: 115, deposit: 115, stage: 'Completed', notes: 'Final files delivered', slug: 'vivian', date: '2026-04-12' },
            { id: 'p4', name: 'Nydeah', business: '', service: 'Logo Design', amount: 99, deposit: 99, stage: 'Design', notes: 'Full payment received', slug: 'nydeah', date: '2026-03-28' },
            { id: 'p5', name: 'Kevin', business: '', service: 'Logo Design', amount: 75, deposit: 75, stage: 'Design', notes: 'Full payment received', slug: 'kevin', date: '2026-03-25' },
            { id: 'p6', name: 'Zianna', business: '', service: 'Logo Design', amount: 70, deposit: 70, stage: 'Design', notes: 'Full payment received', slug: 'zianna', date: '2026-03-22' },
            { id: 'p7', name: 'Layonda', business: '', service: 'Logo Design', amount: 60, deposit: 60, stage: 'Design', notes: 'Full payment received', slug: 'layonda', date: '2026-03-20' },
            { id: 'p8', name: 'Amber Washington', business: 'Blessed Rich Black Girl', service: 'Brand Identity', amount: 175, deposit: 100, stage: 'Received', notes: '$100 deposit paid', slug: 'amber', date: '2026-04-14' }
        ];

        function getProjects() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) return JSON.parse(stored);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultProjects));
            return defaultProjects;
        }

        function saveProjects(projects) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        }

        function genId() {
            return 'p' + Date.now().toString(36);
        }

        render();

        // Render
        function render() {
            const projects = getProjects();
            renderStats(projects);
            renderGrid(projects);
        }

        function renderStats(projects) {
            const total = projects.length;
            const revenue = projects.reduce((s, p) => s + (p.deposit || 0), 0);
            const remaining = projects.reduce((s, p) => s + ((p.amount || 0) - (p.deposit || 0)), 0);
            const active = projects.filter(p => p.stage !== 'Completed').length;

            document.getElementById('statsRow').innerHTML = `
                <div class="stat-card">
                    <div class="label">Total Projects</div>
                    <div class="value blue">${total}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Revenue Collected</div>
                    <div class="value green">$${revenue.toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Remaining</div>
                    <div class="value yellow">$${remaining.toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Active</div>
                    <div class="value purple">${active}</div>
                </div>
            `;
        }

        function getStageClass(stage) {
            const map = { Received: 'stage-received', Design: 'stage-design', Review: 'stage-review', Revision: 'stage-revision', Launch: 'stage-launch', Completed: 'stage-completed' };
            return map[stage] || 'stage-received';
        }

        function renderGrid(projects) {
            const grid = document.getElementById('clientGrid');
            if (projects.length === 0) {
                grid.innerHTML = '<div class="empty"><div class="icon">📋</div><p>No projects yet. Add your first one!</p></div>';
                return;
            }

            grid.innerHTML = projects.map(p => `
                <div class="client-card" onclick="openEditModal('${p.id}')">
                    <div>
                        <div class="client-name">${esc(p.name)}</div>
                        <div class="client-business">${esc(p.business) || '—'}</div>
                        <div class="client-service">${esc(p.service)}</div>
                        <div class="client-meta">
                            <span>💰 $${(p.deposit || 0).toLocaleString()} paid</span>
                            ${p.amount > p.deposit ? `<span>⏳ $${((p.amount || 0) - (p.deposit || 0)).toLocaleString()} remaining</span>` : '<span>✅ Fully paid</span>'}
                            <span>📅 ${p.date || '—'}</span>
                        </div>
                        ${p.slug ? `<a href="https://innergclaw.github.io/SHOPNASGFXTRACKER2026/${p.slug}/" class="tracker-link" onclick="event.stopPropagation()" target="_blank">🔗 Open Tracker →</a>` : ''}
                    </div>
                    <div class="client-right">
                        <div class="client-amount">$${(p.amount || 0).toLocaleString()}</div>
                        <span class="stage-badge ${getStageClass(p.stage)}">${p.stage}</span>
                    </div>
                </div>
            `).join('');
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        // Modal
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Project';
            document.getElementById('editId').value = '';
            document.getElementById('editName').value = '';
            document.getElementById('editBusiness').value = '';
            document.getElementById('editService').value = 'Logo Design';
            document.getElementById('editAmount').value = '';
            document.getElementById('editStage').value = 'Received';
            document.getElementById('editNotes').value = '';
            document.getElementById('editSlug').value = '';
            document.querySelector('.modal-actions .delete').style.display = 'none';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function openEditModal(id) {
            const projects = getProjects();
            const p = projects.find(x => x.id === id);
            if (!p) return;
            document.getElementById('modalTitle').textContent = 'Edit Project';
            document.getElementById('editId').value = p.id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editBusiness').value = p.business || '';
            document.getElementById('editService').value = p.service;
            document.getElementById('editAmount').value = p.amount;
            document.getElementById('editStage').value = p.stage;
            document.getElementById('editNotes').value = p.notes || '';
            document.getElementById('editSlug').value = p.slug || '';
            document.querySelector('.modal-actions .delete').style.display = '';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function saveProject() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            if (!name) { showToast('Client name is required', 'error'); return; }

            const project = {
                id: id || genId(),
                name: name,
                business: document.getElementById('editBusiness').value.trim(),
                service: document.getElementById('editService').value,
                amount: parseFloat(document.getElementById('editAmount').value) || 0,
                deposit: id ? (getProjects().find(x => x.id === id) || {}).deposit || 0 : 0,
                stage: document.getElementById('editStage').value,
                notes: document.getElementById('editNotes').value.trim(),
                slug: document.getElementById('editSlug').value.trim().toLowerCase().replace(/\s+/g, '-'),
                date: id ? (getProjects().find(x => x.id === id) || {}).date : new Date().toISOString().split('T')[0]
            };

            const projects = getProjects();
            if (id) {
                const idx = projects.findIndex(x => x.id === id);
                if (idx >= 0) projects[idx] = project;
            } else {
                project.deposit = 0;
                projects.unshift(project);
            }

            saveProjects(projects);
            closeModal();
            render();
            showToast(id ? 'Project updated!' : 'Project added!', 'success');
        }

        function deleteProject() {
            const id = document.getElementById('editId').value;
            if (!id || !confirm('Delete this project? This cannot be undone.')) return;
            const projects = getProjects().filter(x => x.id !== id);
            saveProjects(projects);
            closeModal();
            render();
            showToast('Project deleted.', 'error');
        }

        function exportData() {
            const projects = getProjects();
            const csv = [
                ['Name', 'Business', 'Service', 'Amount', 'Paid', 'Remaining', 'Stage', 'Date', 'Slug', 'Notes'],
                ...projects.map(p => [p.name, p.business, p.service, p.amount, p.deposit, (p.amount - p.deposit), p.stage, p.date, p.slug, `"${(p.notes || '').replace(/"/g, '""')}"`])
            ].map(r => r.join(',')).join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'shopnasgfx-projects.csv';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported to CSV!', 'success');
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast active ' + type;
            setTimeout(() => t.className = 'toast', 3000);
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', e => {
            if (e.target.id === 'modalOverlay') closeModal();
        });
    </script>

</body>
</html>
