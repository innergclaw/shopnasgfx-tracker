<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopNasGfx — Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            min-height: 100vh;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #0088cc;
        }
        .header p {
            font-size: 0.9rem;
            color: #6b7280;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .stat-box {
            text-align: center;
            padding: 1.5rem 2rem;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            min-width: 140px;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0088cc;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .project-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .project-card:hover {
            border-color: #0088cc;
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 136, 204, 0.15);
        }
        .project-status {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .status-paid { background: rgba(40, 167, 69, 0.15); color: #28a745; border: 1px solid rgba(40, 167, 69, 0.3); }
        .status-pending { background: rgba(220, 38, 38, 0.15); color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.3); }
        .status-deposit { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-progress { background: rgba(0, 136, 204, 0.15); color: #0088cc; border: 1px solid rgba(0, 136, 204, 0.3); }
        .project-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .project-meta {
            font-size: 0.75rem;
            color: #6b7280;
            margin-bottom: 1.25rem;
            line-height: 1.5;
        }
        .project-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1.25rem;
        }
        .url-section {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .url-label {
            font-size: 0.65rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        .url-box {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .url-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #0088cc;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .copy-btn {
            padding: 0.5rem 1rem;
            background: #0088cc;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .copy-btn:hover { background: #006fa1; }
        .copy-btn.copied { background: #28a745; }
        .actions {
            display: flex;
            gap: 0.75rem;
        }
        .action-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }
        .action-btn:hover {
            border-color: #0088cc;
            color: #0088cc;
        }
        .footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #222;
            font-size: 0.75rem;
            color: #4b5563;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .stats { flex-direction: column; gap: 1rem; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ShopNasGfx — Admin Dashboard</h1>
        <p>Manage all client trackers in one place</p>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="totalProjects">4</div>
            <div class="stat-label">Total Projects</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="paidProjects">2</div>
            <div class="stat-label">Paid</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="pendingProjects">1</div>
            <div class="stat-label">Pending Payment</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="totalRevenue">$390</div>
            <div class="stat-label">Revenue</div>
        </div>
    </div>

    <div class="projects-grid" id="projectsGrid">
        <!-- Projects will be injected here -->
    </div>

    <div class="footer">
        ShopNasGfx Admin Dashboard · Built by Nasirr Mayo
    </div>

    <script>
        const projects = [
            {
                id: 'jamal',
                name: 'Hybrid Human',
                client: 'Jamal',
                service: 'Logo + Brand Identity',
                amount: '$350',
                status: 'deposit',
                statusLabel: 'Deposit Paid',
                stage: 'Received',
                started: '2026-04-14',
                url: 'https://innergclaw.github.io/shopnasgfx-tracker/jamal/'
            },
            {
                id: 'helena',
                name: 'Honey & Friends',
                client: 'Helena',
                service: 'Logo + Branding',
                amount: '$175',
                status: 'paid',
                statusLabel: 'Paid',
                stage: 'Review',
                started: '2026-04-01',
                url: 'https://innergclaw.github.io/shopnasgfx-tracker/helena/'
            },
            {
                id: 'vivian',
                name: 'Miikko.Inc',
                client: 'Vivian Royster',
                service: 'New Logo Design',
                amount: '$115',
                status: 'paid',
                statusLabel: 'Paid',
                stage: 'Design',
                started: '2026-04-12',
                url: 'https://innergclaw.github.io/shopnasgfx-tracker/vivian/'
            },
            {
                id: 'herk',
                name: 'Chicken Man Herk',
                client: 'Terry Gaskins',
                service: 'Logo Design',
                amount: '$175',
                status: 'pending',
                statusLabel: 'Payment Pending',
                stage: 'In Progress',
                started: '2026-04-06',
                url: 'https://innergclaw.github.io/shopnasgfx-tracker/herk/'
            }
        ];

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projects.map(project => `
                <div class="project-card" onclick="window.open('${project.url}', '_blank')">
                    <span class="project-status status-${project.status}">${project.statusLabel}</span>
                    <div class="project-name">${project.name}</div>
                    <div class="project-meta">
                        ${project.client} · ${project.service}<br>
                        Started ${project.started} · Stage: ${project.stage}
                    </div>
                    <div class="project-amount">${project.amount}</div>
                    
                    <div class="url-section">
                        <div class="url-label">Client Tracker URL</div>
                        <div class="url-box">
                            <input type="text" class="url-input" value="${project.url}" readonly id="url-${project.id}">
                            <button class="copy-btn" onclick="event.stopPropagation(); copyUrl('${project.id}')">Copy</button>
                        </div>
                    </div>
                    
                    <div class="actions">
                        <a href="${project.url}" target="_blank" class="action-btn" onclick="event.stopPropagation()">Open Tracker</a>
                    </div>
                </div>
            `).join('');
        }

        function copyUrl(projectId) {
            const input = document.getElementById(`url-${projectId}`);
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            
            const btn = input.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 2000);
        }

        renderProjects();
    </script>
</body>
</html>
